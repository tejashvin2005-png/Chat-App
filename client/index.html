<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Advanced Chat App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="light">

<!-- LOGIN -->
<div id="login">
  <div class="login-box">

    <h2>💬 Welcome Back</h2>
    <p>Join the chat in seconds</p>

    <input type="text" id="username" placeholder="Enter username">

    <!-- PROFILE PREVIEW -->
    <input type="file" id="profilePic" onchange="previewPic()">
    <img id="preview" src="" alt="Preview" />

    <button onclick="joinChat()">🚀 Join Chat</button>

  </div>
</div>
<!-- CHAT -->
<div id="chat" style="display:none;">
  
  <div class="header">
    <h2>💬 Chat App</h2>

    <!-- THEME -->
    <button onclick="toggleDark()">🌙</button>

    <!-- BACKGROUND -->
    <!-- BACKGROUND BUTTONS -->
<div class="bg-controls">
  <button onclick="changeBg('bg1')">🌄</button>
  <button onclick="changeBg('bg2')">🌆</button>
  <button onclick="changeBg('bg3')">🌌</button>
</div>
  </div>

  <div id="users"></div>
  <div id="messages"></div>
  <div id="typing"></div>

  <!-- INPUT -->
  <div class="input-area">
    <input id="messageInput" placeholder="Type message...">
    <button onclick="sendMessage()">➤</button>
  </div>

  <!-- EMOJI -->
  <button onclick="toggleEmoji()">😊</button>
  <div id="emojiBox" class="emoji-box"></div>

  <!-- IMAGE -->
  <input type="file" id="fileInput">
  <button onclick="sendImage()">📷SEND</button>

  <!-- ACTIONS -->
  <button onclick="clearChat()">Clear</button>
  <button onclick="logout()">Logout</button>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
